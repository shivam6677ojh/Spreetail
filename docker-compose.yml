services:
  postgres:
    image: postgres:16-alpine
    container_name: spreetail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: spreetail
      POSTGRES_PASSWORD: spreetail
      POSTGRES_DB: spreetail
    ports:
      - "5432:5432"
    volumes:
      - spreetail-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spreetail -d spreetail"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  spreetail-postgres-data:

